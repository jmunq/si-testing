    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #21262d;
        --text-primary: #f0f6fc;
        --text-secondary: #8b949e;
        --accent-coral: #ff6b6b;
        --accent-teal: #4ecdc4;
        --accent-gold: #ffd93d;
        --gradient-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Instrument Sans', sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: 
          radial-gradient(ellipse at 50% 0%, rgba(78, 205, 196, 0.15) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 100%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
      }

      .container {
        max-width: 480px;
        margin: 0 auto;
        padding: 40px 20px;
        text-align: center;
      }

      .success-icon {
        width: 100px;
        height: 100px;
        background: var(--gradient-hero);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 32px;
        font-size: 48px;
        animation: scaleIn 0.5s ease-out, pulse 2s ease-in-out infinite 0.5s;
      }

      @keyframes scaleIn {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
        50% { box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
      }

      h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 36px;
        font-weight: 400;
        margin-bottom: 16px;
        background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-teal) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: fadeInUp 0.6s ease-out 0.2s both;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message {
        color: var(--text-secondary);
        font-size: 16px;
        margin-bottom: 32px;
        animation: fadeInUp 0.6s ease-out 0.3s both;
      }

      .profile-card {
        background: var(--bg-secondary);
        border: 1px solid var(--bg-tertiary);
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 32px;
        animation: fadeInUp 0.6s ease-out 0.4s both;
      }

      .profile-card h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent-coral);
        margin-bottom: 16px;
      }

      .profile-info {
        text-align: left;
      }

      .profile-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--bg-tertiary);
      }

      .profile-row:last-child {
        border-bottom: none;
      }

      .profile-label {
        color: var(--text-secondary);
        font-size: 14px;
      }

      .profile-value {
        color: var(--text-primary);
        font-weight: 500;
      }

      .back-btn {
        display: inline-block;
        padding: 14px 32px;
        background: var(--gradient-hero);
        border: none;
        border-radius: 12px;
        color: white;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        animation: fadeInUp 0.6s ease-out 0.5s both;
      }

      .back-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
      }

      footer {
        margin-top: 48px;
        color: var(--text-secondary);
        font-size: 14px;
        animation: fadeInUp 0.6s ease-out 0.6s both;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="success-icon">✓</div>
      
      <h1>Profile Created!</h1>
      <p class="message">Welcome aboard! Your journey begins now. We're thrilled to have you join our community of explorers.</p>
      
      <div class="profile-card">
        <h2>Your Details</h2>
        <div class="profile-info" id="profile-info">
          <div class="profile-row">
            <span class="profile-label">Status</span>
            <span class="profile-value" style="color: var(--accent-teal);">Active</span>
          </div>
          <div class="profile-row">
            <span class="profile-label">Member Since</span>
            <span class="profile-value" id="join-date">Today</span>
          </div>
        </div>
      </div>
      
      <a href="index.html" class="back-btn">← Back to Home</a>
      
      <footer>
        <p>Questions? <a href="#" style="color: var(--accent-teal); text-decoration: none;">Contact Support</a></p>
      </footer>
    </div>

    <script>
      // Parse URL parameters and display them
      const params = new URLSearchParams(window.location.search);
      const profileInfo = document.getElementById('profile-info');
      
      const fields = {
        'fullname': 'Name',
        'email': 'Email',
        'interest': 'Interest'
      };

      // Insert dynamic fields before the status row
      const firstRow = profileInfo.querySelector('.profile-row');
      
      for (const [key, label] of Object.entries(fields)) {
        const value = params.get(key);
        if (value) {
          const row = document.createElement('div');
          row.className = 'profile-row';
          row.innerHTML = `
            <span class="profile-label">${label}</span>
            <span class="profile-value">${value}</span>
          `;
          profileInfo.insertBefore(row, firstRow);
        }
      }

      // Set current date
      document.getElementById('join-date').textContent = new Date().toLocaleDateString('en-US', {
        month: 'long',
        day: 'numeric',
        year: 'numeric'
      });
    </script>
  </body>
