<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amet Consequat</title>
  <script>
    // Landing page redirects to the first process (just like the real site entry point)
    var isGitHub = window.location.hostname.indexOf('github.io') !== -1;
    var pathParts = window.location.pathname.split('/');
    // On GitHub Project Pages, the first part after the domain is the repo name.
    // If we're on a User Page or root, split('/')[1] will be empty or a file/folder.
    // A simple way is to check if it's likely a repo name (not empty and not 'page').
    var repoName = (isGitHub && pathParts[1] && pathParts[1] !== 'page') ? '/' + pathParts[1] : '';
    window.location.href = repoName + '/page/rappipublic/es/MX/process/enter/CreateGadgetQuotePublicProcess/?modelTextId=Gadget&initProcessAction=ToInitial&activeZone=ProcessZone';
  </script>
</head>
<body>
  <p>Redirigiendo...</p>
</body>
</html>
